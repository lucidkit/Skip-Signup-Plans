kind = "web"
previewPath = "/"
title = "Pricing Plans"
version = "1.0.0"
id = "artifacts/pricing-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21389

[services.development]
run = "pnpm --filter @workspace/pricing-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pricing-app", "run", "build" ]
publicDir = "artifacts/pricing-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21389"
BASE_PATH = "/"
